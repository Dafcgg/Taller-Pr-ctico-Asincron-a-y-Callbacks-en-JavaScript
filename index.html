<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de Compras</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
</head>
<body>

<div class="container">

    <h1>🛒 Sistema de Supermercado</h1>

    <section>
        <h2>Productos Disponibles</h2>
        <div id="productosLista" class="productos-grid"></div>
    </section>

    <section>
        <h2>Carrito de Compras</h2>
        <div id="carritoLista" class="carrito-items"></div>

        <div class="totales">
            <p><strong>Total de Productos:</strong> <span id="totalCantidad">0</span></p>
            <p><strong>Total a Pagar:</strong> <span id="totalPrecio">0.00</span></p>
        </div>

        <button id="limpiarCarrito">Limpiar Carrito</button>
    </section>

</div>

</body>
</html>
